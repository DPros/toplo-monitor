name: toplo-monitor

on:
  schedule:
    # Every 3 hours. For once-daily use: "0 6 * * *" (06:00 UTC = 09:00 Sofia).
    # Note: GitHub may delay scheduled runs, and a scheduled workflow is
    # auto-disabled after 60 days with no repo activity.
    - cron: "0 */3 * * *"
  workflow_dispatch:      # lets you trigger a run manually from the Actions tab
    inputs:
      test:
        description: "Test run: re-notify all current matches, ignoring saved state (does not persist state)"
        type: boolean
        default: false

permissions:
  contents: write          # required to commit state.json back to the repo

concurrency:
  group: toplo-monitor
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    # Secrets (SMTP_*, etc.) are scoped to the "test" GitHub Environment, so the
    # job must declare it to read them. Note: if this environment has protection
    # rules (required reviewers / wait timer), scheduled runs will PAUSE for
    # approval — keep it rule-free for an unattended monitor.
    environment: test
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history so we can rebase the state commit on push races

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install -r requirements.txt

      - name: Run monitor
        # Each value may live as an Environment *secret* OR *variable* (only the
        # SMTP password needs to be secret), so read from whichever has it.
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN || vars.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID   || vars.TELEGRAM_CHAT_ID }}
          SMTP_HOST:          ${{ secrets.SMTP_HOST          || vars.SMTP_HOST }}
          SMTP_PORT:          ${{ secrets.SMTP_PORT          || vars.SMTP_PORT }}
          SMTP_USER:          ${{ secrets.SMTP_USER          || vars.SMTP_USER }}
          SMTP_PASS:          ${{ secrets.SMTP_PASS          || vars.SMTP_PASS }}
          EMAIL_FROM:         ${{ secrets.EMAIL_FROM         || vars.EMAIL_FROM }}
          EMAIL_TO:           ${{ secrets.EMAIL_TO           || vars.EMAIL_TO }}
          WEBHOOK_URL:        ${{ secrets.WEBHOOK_URL        || vars.WEBHOOK_URL }}
        run: python toplo_monitor.py ${{ inputs.test == true && '--test' || '' }}

      - name: Persist state
        run: |
          if [[ -z "$(git status --porcelain state.json)" ]]; then
            echo "No state change to commit."
            exit 0
          fi
          git config user.name  "toplo-monitor[bot]"
          git config user.email "actions@users.noreply.github.com"

          # state.json is regenerated in full every run and owned solely by this
          # job. On a push race we must NOT merge/rebase (two runs both rewrite
          # the file -> conflict); instead re-apply OUR freshly-computed file on
          # top of the latest remote tip and retry.
          branch="${GITHUB_REF_NAME:-main}"
          cp state.json /tmp/state.json
          for attempt in 1 2 3 4 5; do
            git fetch --quiet origin "${branch}"
            git reset --hard --quiet "origin/${branch}"
            cp /tmp/state.json state.json
            git add state.json
            if git diff --cached --quiet; then
              echo "Remote already has this state; nothing to push."
              exit 0
            fi
            git commit --quiet -m "chore: update outage state [skip ci]"
            if git push origin "HEAD:${branch}"; then
              echo "Pushed state on attempt ${attempt}."
              exit 0
            fi
            echo "Push rejected; re-syncing on origin/${branch} (attempt ${attempt})."
          done
          echo "Failed to push state after retries." >&2
          exit 1
