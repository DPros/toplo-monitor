name: toplo-monitor

on:
  schedule:
    # Every 3 hours. For once-daily use: "0 6 * * *" (06:00 UTC = 09:00 Sofia).
    # Note: GitHub may delay scheduled runs, and a scheduled workflow is
    # auto-disabled after 60 days with no repo activity.
    - cron: "0 */3 * * *"
  workflow_dispatch:      # lets you trigger a run manually from the Actions tab
    inputs:
      test:
        description: "Test run: re-notify all current matches, ignoring saved state (does not persist state)"
        type: boolean
        default: false

permissions:
  contents: write          # required to commit state.json back to the repo

concurrency:
  group: toplo-monitor
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history so we can rebase the state commit on push races

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install -r requirements.txt

      - name: Run monitor
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
          SMTP_HOST:          ${{ secrets.SMTP_HOST }}
          SMTP_PORT:          ${{ secrets.SMTP_PORT }}
          SMTP_USER:          ${{ secrets.SMTP_USER }}
          SMTP_PASS:          ${{ secrets.SMTP_PASS }}
          EMAIL_FROM:         ${{ secrets.EMAIL_FROM }}
          EMAIL_TO:           ${{ secrets.EMAIL_TO }}
          WEBHOOK_URL:        ${{ secrets.WEBHOOK_URL }}
        run: python toplo_monitor.py ${{ inputs.test == true && '--test' || '' }}

      - name: Persist state
        run: |
          if [[ -z "$(git status --porcelain state.json)" ]]; then
            echo "No state change to commit."
            exit 0
          fi
          git config user.name  "toplo-monitor[bot]"
          git config user.email "actions@users.noreply.github.com"
          git add state.json
          git commit -m "chore: update outage state [skip ci]"

          # main can advance between checkout and push (e.g. a human pushing
          # code). Rebase our single state-only commit onto the latest main and
          # retry. state.json has no other writer, so the rebase stays clean.
          branch="${GITHUB_REF_NAME:-main}"
          for attempt in 1 2 3 4 5; do
            if git push origin "HEAD:${branch}"; then
              echo "Pushed state on attempt ${attempt}."
              exit 0
            fi
            echo "Push rejected; rebasing on origin/${branch} (attempt ${attempt})."
            git fetch origin "${branch}"
            git rebase "origin/${branch}" || { git rebase --abort; exit 1; }
          done
          echo "Failed to push state after retries." >&2
          exit 1
